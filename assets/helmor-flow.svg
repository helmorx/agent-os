<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HELMOR Agent workflow</title>
  <desc id="desc">A workflow diagram showing AI coding agents routed through HELMOR Agent to project truth, skills, detectors, checks, and handoffs.</desc>
  <rect width="1120" height="560" rx="28" fill="#070A11"/>
  <rect x="34" y="34" width="1052" height="492" rx="24" fill="#0C121D" stroke="#213047"/>
  <text x="64" y="82" fill="#EAF1FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">How HELMOR Agent keeps a session on track</text>
  <text x="64" y="114" fill="#9FB0CA" font-family="Inter, Arial, sans-serif" font-size="16">One local CLI gives AI coding agents project memory, skill routing, safety checks, and deterministic handoff points.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5DE4A8"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <rect x="64" y="190" width="190" height="134" rx="18" fill="#111A2A" stroke="#33445F"/>
    <text x="92" y="235" fill="#EAF1FF" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">AI coding agents</text>
    <text x="92" y="268" fill="#BFD0E8" font-family="Inter, Arial, sans-serif" font-size="14">Codex, Claude Code,</text>
    <text x="92" y="290" fill="#BFD0E8" font-family="Inter, Arial, sans-serif" font-size="14">Cursor, Windsurf</text>
  </g>

  <path d="M268 257H356" stroke="#5DE4A8" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="374" y="168" width="256" height="178" rx="22" fill="#0F241B" stroke="#2DBE7F"/>
    <text x="418" y="222" fill="#EAF1FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">HELMOR Agent</text>
    <text x="418" y="260" fill="#BFF5D8" font-family="Inter, Arial, sans-serif" font-size="15">local watcher + CLI</text>
    <rect x="418" y="286" width="76" height="28" rx="14" fill="#19C37D"/>
    <text x="437" y="305" fill="#04110B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">observe</text>
    <rect x="506" y="286" width="62" height="28" rx="14" fill="#111827" stroke="#34523F"/>
    <text x="522" y="305" fill="#CFF8E1" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">guard</text>
  </g>

  <path d="M646 257H730" stroke="#5DE4A8" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="760" y="145" width="296" height="250" rx="20" fill="#111A2A" stroke="#33445F"/>
    <text x="794" y="190" fill="#EAF1FF" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Project control surface</text>
    <g font-family="Inter, Arial, sans-serif" font-size="14">
      <rect x="794" y="220" width="108" height="34" rx="12" fill="#18253A"/>
      <text x="816" y="242" fill="#BFD0E8">truth files</text>
      <rect x="918" y="220" width="102" height="34" rx="12" fill="#18253A"/>
      <text x="944" y="242" fill="#BFD0E8">skills</text>
      <rect x="794" y="270" width="108" height="34" rx="12" fill="#18253A"/>
      <text x="816" y="292" fill="#BFD0E8">detectors</text>
      <rect x="918" y="270" width="102" height="34" rx="12" fill="#18253A"/>
      <text x="942" y="292" fill="#BFD0E8">checks</text>
      <rect x="794" y="320" width="226" height="34" rx="12" fill="#18253A"/>
      <text x="834" y="342" fill="#BFD0E8">handoff + context card</text>
    </g>
  </g>

  <path d="M502 362V438" stroke="#5DE4A8" stroke-width="3" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="310" y="450" width="384" height="58" rx="18" fill="#171827" stroke="#443B6B"/>
    <text x="348" y="486" fill="#D8CCFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Fewer repeated scans, fewer unsafe actions, cleaner closeout</text>
  </g>
</svg>
