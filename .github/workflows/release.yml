name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
      - name: Verify npm publish token
        run: test -n "$NODE_AUTH_TOKEN"
      - name: Verify release versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cli="$(go run ./cmd/helmor version)"
          npm_pkg="$(node -p "require('./npm/helmor/package.json').version")"
          scoped_pkg="$(node -p "require('./npm/agent/package.json').version")"
          test "$tag" = "$cli"
          test "$tag" = "$npm_pkg"
          test "$tag" = "$scoped_pkg"
      - run: |
          mkdir -p dist
          for os in darwin linux windows; do
            for arch in amd64 arm64; do
              ext=""
              archive_ext="tar.gz"
              if [ "$os" = "windows" ]; then
                ext=".exe"
                archive_ext="zip"
              fi
              name="helmor_${os}_${arch}"
              GOOS="$os" GOARCH="$arch" go build -o "dist/helmor$ext" ./cmd/helmor
              if [ "$archive_ext" = "zip" ]; then
                (cd dist && zip "$name.zip" "helmor$ext")
              else
                (cd dist && tar -czf "$name.tar.gz" "helmor$ext")
              fi
              rm "dist/helmor$ext"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - run: npm test
        working-directory: npm/helmor
      - run: npm test
        working-directory: npm/agent
      - run: npm run pack:dry
        working-directory: npm/helmor
      - run: npm run pack:dry
        working-directory: npm/agent
      - name: Publish helmor to npm
        run: npm publish --provenance --access public --tag latest
        working-directory: npm/helmor
      - name: Publish scoped npm alias
        run: npm publish --provenance --access public --tag latest
        working-directory: npm/agent
