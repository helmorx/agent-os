name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: go test ./...
      - run: go vet ./...
      - run: npm test
        working-directory: npm/helmor
      - run: npm test
        working-directory: npm/agent
      - run: npm run pack:dry
        working-directory: npm/helmor
      - run: npm run pack:dry
        working-directory: npm/agent
